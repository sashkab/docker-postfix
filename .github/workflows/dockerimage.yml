name: Build docker-postfix image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 12 * * 5"

permissions: read-all

env:
  IMAGE_NAME: docker-postfix

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: generate certificates
        run: |
          sudo apt-get -y install rng-tools
          openssl req -nodes -newkey rsa:2048 -x509 -keyout key.pem -out cert.pem -days 90 -subj '/CN=localhost'

      - name: build and start
        run: |
          docker compose -p smtp -f docker-compose.yml up --build -d
          sleep 20s

      - name: check running containers
        run: |
          set -ex
          docker ps -a
          echo -e "EHLO user@domain\r\nquit\r" | nc localhost 25
          echo -e "EHLO user@domain\r\nquit\r" | nc localhost 587

      - name: show logs
        run: docker compose -p smtp logs

      - name: stop and cleanup
        run: |
          docker compose -p smtp down
          docker volume rm smtp_postfix

  push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log into registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build . --file Dockerfile --tag image

      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          VERSION="$(date +%Y.%m.%d)"
          echo IMAGE_ID="$IMAGE_ID"
          echo VERSION="$VERSION"
          docker tag image "$IMAGE_ID:$VERSION"
          docker push "$IMAGE_ID:$VERSION"
          docker tag "$IMAGE_ID:$VERSION" "$IMAGE_ID:latest"
          docker push "$IMAGE_ID:latest"

  cleanup:
    needs: push
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Package cleanup
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ github.event.repository.name }}
          KEEP: 5
        run: |
          set -euo pipefail

          gh api --paginate \
            "/users/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
            --jq '
              .[]
              | select((.metadata.container.tags // []) | index("latest") | not)
              | .id
            ' |
            tail -n +"$((KEEP + 1))" |
            while read -r id; do
              echo "Deleting package version $id"
              gh api \
                --method DELETE \
                "/users/$OWNER/packages/container/$PACKAGE/versions/$id"
            done
